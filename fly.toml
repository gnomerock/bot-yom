# fly.toml app configuration file generated for bot-yom on 2026-05-25T18:40:58Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bot-yom'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
